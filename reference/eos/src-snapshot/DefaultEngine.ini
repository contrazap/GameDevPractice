; BaseEngine.ini seeds AuthScopeFlags with BasicProfile+FriendsList+Presence.
; '+' only appends, so without clearing first, login requests FriendsList/Presence
; and Epic rejects it ("Invalid Client - scope: friends_list") because the EAS app
; is Basic Profile only. Clear the inherited array, then request BasicProfile alone.
!AuthScopeFlags=ClearArray
+AuthScopeFlags=BasicProfile
; The EOS +Artifacts line (ClientId/ClientSecret/EncryptionKey/etc.) is kept OUT of
; version control. Real values live in gitignored platform configs that still cook
; into packaged builds:
;   Config/Windows/WindowsEngine.ini   (editor + packaged Windows)
;   Config/Android/AndroidEngine.ini   (packaged Android)
; Copy the committed *.ini.template files, fill in your Epic Dev Portal keys, and
; keep them untracked. See docs/SECRETS_SETUP.md.

